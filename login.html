<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - JCE AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a1628; --navy-mid: #112240;
      --gold: #d4a843; --gold-light: #f0c55a;
      --text: #e8dcc8; --text-muted: #8a9bbf;
      --error: #ff6b6b; --success: #51cf66;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: radial-gradient(ellipse at 80% 30%, rgba(212,168,67,0.06) 0%, transparent 60%);
    }

    .card {
      background: rgba(17, 34, 64, 0.9);
      border: 1px solid rgba(212, 168, 67, 0.2);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.5s ease;
    }

    .card-header { text-align: center; margin-bottom: 2rem; }

    .logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1rem;
    }

    .card-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.3rem; }
    .card-header p { color: var(--text-muted); font-size: 0.9rem; }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block; font-size: 0.85rem; font-weight: 500;
      color: var(--text-muted); margin-bottom: 0.4rem;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    input {
      width: 100%; padding: 0.85rem 1.1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: var(--text);
      font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s; outline: none;
    }

    input:focus {
      border-color: var(--gold);
      background: rgba(212,168,67,0.05);
      box-shadow: 0 0 0 3px rgba(212,168,67,0.1);
    }

    input.error { border-color: var(--error); }

    .field-error { color: var(--error); font-size: 0.78rem; margin-top: 0.3rem; display: none; }
    .field-error.show { display: block; }

    .btn {
      width: 100%; padding: 0.95rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy); border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.3s; margin-top: 0.5rem;
    }

    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(212,168,67,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert { padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.88rem; margin-bottom: 1rem; display: none; }
    .alert.show { display: block; }
    .alert.error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: var(--error); }
    .alert.success { background: rgba(81,207,102,0.1); border: 1px solid rgba(81,207,102,0.3); color: var(--success); }

    .divider { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin: 1.2rem 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: rgba(255,255,255,0.1); }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .link-btn {
      display: block; text-align: center; color: var(--gold);
      text-decoration: none; font-size: 0.9rem; padding: 0.7rem;
      border: 1px solid rgba(212,168,67,0.3); border-radius: 12px; transition: all 0.2s;
    }
    .link-btn:hover { background: rgba(212,168,67,0.1); }

    .back-link { display: block; text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; margin-top: 1rem; transition: color 0.2s; }
    .back-link:hover { color: var(--text); }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(10,22,40,0.3); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">🎓</div>
      <h1>Welcome Back</h1>
      <p>Sign in to access the JCE AI Assistant</p>
    </div>

    <div class="alert" id="alert"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      <div class="field-error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      <div class="field-error" id="passwordError"></div>
    </div>

    <button class="btn" id="submitBtn" onclick="handleLogin()">Sign In</button>

    <div class="divider">new to JCE Assistant?</div>
    <a href="/register" class="link-btn">Create Free Account</a>
    <a href="/" class="back-link">← Back to Home</a>
  </div>

  <script>
    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));
      document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
      const alert = document.getElementById('alert');
      alert.classList.remove('show', 'error', 'success');
    }

    function showFieldError(fieldId, errorId, msg) {
      document.getElementById(fieldId).classList.add('error');
      const err = document.getElementById(errorId);
      err.textContent = msg;
      err.classList.add('show');
    }

    function showAlert(msg, type) {
      const alert = document.getElementById('alert');
      alert.textContent = msg;
      alert.className = `alert show ${type}`;
    }

    function validateForm() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;
      clearErrors();

      if (!email) {
        showFieldError('email', 'emailError', 'Email is required');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldError('email', 'emailError', 'Please enter a valid email');
        valid = false;
      }

      if (!password) {
        showFieldError('password', 'passwordError', 'Password is required');
        valid = false;
      }

      return valid;
    }

    async function handleLogin() {
      if (!validateForm()) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing In...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });

        const result = await response.json();

        if (result.success) {
          showAlert('✅ ' + result.message, 'success');
          setTimeout(() => window.location.href = result.redirect || '/chat', 800);
        } else {
          showAlert('❌ ' + result.message, 'error');
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      } catch (err) {
        showAlert('❌ Connection error. Please check if server is running.', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
